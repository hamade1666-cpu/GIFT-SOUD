<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تهنئة لصديقي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&family=Marck+Script&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a12;
            --bg-mid: #12121f;
            --gold: #f4c430;
            --gold-light: #ffd966;
            --rose: #ff6b8a;
            --rose-deep: #e84a6f;
            --cream: #fff8e7;
            --teal: #2dd4bf;
            --purple: #a855f7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-deep);
            font-family: 'Tajawal', sans-serif;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        #mainCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        .overlay-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .title-wrapper {
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            animation: titleReveal 1.5s ease-out 2s forwards;
        }

        @keyframes titleReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .main-title {
            font-size: clamp(28px, 7vw, 60px);
            font-weight: 900;
            color: transparent;
            background: linear-gradient(135deg, var(--gold) 0%, var(--rose) 50%, var(--gold-light) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: none;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .friend-name {
            font-family: 'Marck Script', cursive;
            font-size: clamp(32px, 9vw, 72px);
            color: var(--gold);
            text-shadow: 
                0 0 20px rgba(244, 196, 48, 0.5),
                0 0 40px rgba(244, 196, 48, 0.3);
            animation: nameGlow 2s ease-in-out infinite alternate;
            margin-bottom: 20px;
        }

        @keyframes nameGlow {
            from {
                text-shadow: 
                    0 0 20px rgba(244, 196, 48, 0.5),
                    0 0 40px rgba(244, 196, 48, 0.3);
            }
            to {
                text-shadow: 
                    0 0 30px rgba(244, 196, 48, 0.8),
                    0 0 60px rgba(244, 196, 48, 0.5),
                    0 0 80px rgba(255, 107, 138, 0.3);
            }
        }

        .message-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(244, 196, 48, 0.3);
            border-radius: 20px;
            padding: clamp(15px, 4vw, 30px);
            max-width: 600px;
            text-align: center;
            opacity: 0;
            transform: scale(0.9);
            animation: boxReveal 1s ease-out 3s forwards;
        }

        @keyframes boxReveal {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .message-text {
            font-size: clamp(14px, 3.5vw, 20px);
            color: var(--cream);
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .message-highlight {
            color: var(--rose);
            font-weight: 700;
        }

        .signature {
            font-size: clamp(12px, 3vw, 16px);
            color: var(--teal);
            opacity: 0.8;
            margin-top: 10px;
        }

        /* Floating particles CSS backup */
        .css-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .css-particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Loading screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-text {
            color: var(--gold);
            font-size: 18px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Tap hint */
        .tap-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            z-index: 20;
            animation: bounce 2s ease-in-out infinite;
            pointer-events: auto;
            cursor: pointer;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-text">جاري تحضير المفاجأة...</div>
    </div>

    <canvas id="mainCanvas"></canvas>

    <div class="css-particles" id="cssParticles"></div>

    <div class="overlay-container">
        <div class="title-wrapper">
            <h1 class="main-title">تهنئة من القلب</h1>
            <h2 class="friend-name">𝓢𝓞𝓤𝓓_𝓚𝓔𝓝_𝟖𝟖_</h2>
            <div class="message-box">
                <p class="message-text">
                    صديقي العزيز، شكراً لأنك <span class="message-highlight">تعتني بي</span> وتملأ حياتي فرحاً.
                    <br><br>
                    رسوماتك هي <span class="message-highlight">كنز</span> لا يُقدر بثمن،
                    <br>
                    وقلبك الكبير يجعلك صديقاً لن يتكرر.
                </p>
                <p class="signature">بكل حب وتقدير</p>
            </div>
        </div>
    </div>

    <div class="tap-hint" id="tapHint">اضغط للتفاعل</div>

    <script>
        (function() {
            'use strict';

            // ==================== INITIALIZATION ====================
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            const loadingScreen = document.getElementById('loadingScreen');
            const cssParticles = document.getElementById('cssParticles');
            const tapHint = document.getElementById('tapHint');

            let width = 0;
            let height = 0;
            let centerX = 0;
            let centerY = 0;
            let time = 0;
            let mouseX = 0;
            let mouseY = 0;
            let isInteracting = false;

            // Colors
            const COLORS = {
                gold: '#f4c430',
                goldLight: '#ffd966',
                rose: '#ff6b8a',
                roseDeep: '#e84a6f',
                teal: '#2dd4bf',
                purple: '#a855f7',
                cream: '#fff8e7',
                dark: '#0a0a12',
                deepPurple: '#1a1a2e'
            };

            // ==================== RESIZE HANDLER ====================
            function resize() {
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                canvas.style.width = width + 'px';
                canvas.style.height = height + 'px';
                ctx.scale(dpr, dpr);
                centerX = width / 2;
                centerY = height / 2;
            }

            // ==================== DRAWING UTILITIES ====================
            function lerp(a, b, t) {
                return a + (b - a) * t;
            }

            function easeInOutQuad(t) {
                return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
            }

            function easeOutElastic(t) {
                const c4 = (2 * Math.PI) / 3;
                return t === 0 ? 0 : t === 1 ? 1 : Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
            }

            function drawCircle(x, y, r, color, glow = false) {
                if (r <= 0) return;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                if (glow) {
                    ctx.shadowColor = color;
                    ctx.shadowBlur = 20;
                }
                ctx.fillStyle = color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            function drawLine(x1, y1, x2, y2, color, lineWidth = 1) {
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = color;
                ctx.lineWidth = lineWidth;
                ctx.stroke();
            }

            // ==================== HEART SHAPE ====================
            function drawHeart(x, y, size, color, rotation = 0, glow = true) {
                if (size <= 0) return;
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rotation);
                ctx.scale(size, size);
                ctx.beginPath();
                ctx.moveTo(0, -0.3);
                ctx.bezierCurveTo(-0.5, -0.8, -1, -0.3, -1, 0.2);
                ctx.bezierCurveTo(-1, 0.6, -0.5, 0.9, 0, 1.2);
                ctx.bezierCurveTo(0.5, 0.9, 1, 0.6, 1, 0.2);
                ctx.bezierCurveTo(1, -0.3, 0.5, -0.8, 0, -0.3);
                ctx.closePath();
                if (glow) {
                    ctx.shadowColor = color;
                    ctx.shadowBlur = 15;
                }
                ctx.fillStyle = color;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.restore();
            }

            // ==================== FLOWER SHAPE ====================
            function drawFlower(x, y, size, petalCount, color, rotation = 0) {
                if (size <= 0) return;
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rotation);
                
                const petalSize = size * 0.4;
                for (let i = 0; i < petalCount; i++) {
                    const angle = (i / petalCount) * Math.PI * 2;
                    const px = Math.cos(angle) * size * 0.5;
                    const py = Math.sin(angle) * size * 0.5;
                    
                    ctx.beginPath();
                    ctx.ellipse(px, py, petalSize, petalSize * 0.5, angle, 0, Math.PI * 2);
                    ctx.fillStyle = color;
                    ctx.fill();
                }
                
                // Center
                drawCircle(0, 0, size * 0.2, COLORS.gold);
                ctx.restore();
            }

            // ==================== STAR SHAPE ====================
            function drawStar(x, y, size, points, color, rotation = 0, glow = true) {
                if (size <= 0) return;
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rotation);
                ctx.beginPath();
                
                for (let i = 0; i < points * 2; i++) {
                    const r = i % 2 === 0 ? size : size * 0.5;
                    const angle = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
                    const px = Math.cos(angle) * r;
                    const py = Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                
                if (glow) {
                    ctx.shadowColor = color;
                    ctx.shadowBlur = 15;
                }
                ctx.fillStyle = color;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.restore();
            }

            // ==================== CHARACTER DRAWING ====================
            function drawCharacter(x, y, scale, bobOffset, isWaving) {
                ctx.save();
                ctx.translate(x, y + bobOffset);
                ctx.scale(scale, scale);
                
                // Body (simple rounded shape)
                ctx.beginPath();
                ctx.ellipse(0, 30, 25, 35, 0, 0, Math.PI * 2);
                ctx.fillStyle = COLORS.deepPurple;
                ctx.fill();
                ctx.strokeStyle = COLORS.teal;
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Head
                ctx.beginPath();
                ctx.arc(0, -15, 22, 0, Math.PI * 2);
                ctx.fillStyle = '#ffdbac';
                ctx.fill();
                ctx.strokeStyle = '#e0b090';
                ctx.lineWidth = 1;
                ctx.stroke();
                
                // Hair
                ctx.beginPath();
                ctx.arc(0, -20, 22, Math.PI, Math.PI * 2);
                ctx.fillStyle = '#4a3728';
                ctx.fill();
                
                // Eyes (animated blink)
                const blinkPhase = Math.sin(time * 0.1);
                const eyeHeight = blinkPhase > 0.95 ? 1 : 5;
                
                // Left eye
                ctx.beginPath();
                ctx.ellipse(-8, -15, 4, eyeHeight, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#2d2d2d';
                ctx.fill();
                
                // Right eye
                ctx.beginPath();
                ctx.ellipse(8, -15, 4, eyeHeight, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#2d2d2d';
                ctx.fill();
                
                // Eye shine
                if (eyeHeight > 2) {
                    drawCircle(-6, -17, 1.5, '#ffffff');
                    drawCircle(10, -17, 1.5, '#ffffff');
                }
                
                // Smile
                ctx.beginPath();
                ctx.arc(0, -8, 8, 0.2, Math.PI - 0.2);
                ctx.strokeStyle = '#c4756a';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Blush
                ctx.beginPath();
                ctx.ellipse(-15, -8, 5, 3, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 150, 150, 0.5)';
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(15, -8, 5, 3, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 150, 150, 0.5)';
                ctx.fill();
                
                // Left arm (static)
                ctx.beginPath();
                ctx.ellipse(-30, 25, 8, 15, -0.3, 0, Math.PI * 2);
                ctx.fillStyle = '#ffdbac';
                ctx.fill();
                
                // Right arm (waving)
                ctx.save();
                const waveAngle = isWaving ? Math.sin(time * 0.15) * 0.3 - 0.8 : -0.3;
                ctx.translate(30, 10);
                ctx.rotate(waveAngle);
                ctx.beginPath();
                ctx.ellipse(0, 15, 8, 18, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#ffdbac';
                ctx.fill();
                
                // Hand
                ctx.beginPath();
                ctx.arc(0, 35, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#ffdbac';
                ctx.fill();
                ctx.restore();
                
                // Legs
                ctx.beginPath();
                ctx.ellipse(-12, 70, 8, 12, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#3a3a5a';
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(12, 70, 8, 12, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#3a3a5a';
                ctx.fill();
                
                ctx.restore();
            }

            // ==================== PALETTE & BRUSH ====================
            function drawPalette(x, y, scale, rotation) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rotation);
                ctx.scale(scale, scale);
                
                // Palette body
                ctx.beginPath();
                ctx.ellipse(0, 0, 40, 30, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#8b7355';
                ctx.fill();
                ctx.strokeStyle = '#6b5344';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Thumb hole
                ctx.beginPath();
                ctx.arc(-25, 0, 10, 0, Math.PI * 2);
                ctx.fillStyle = COLORS.dark;
                ctx.fill();
                
                // Paint dots
                const paintColors = [COLORS.rose, COLORS.gold, COLORS.teal, COLORS.purple, '#ff9f43'];
                const positions = [[10, -15], [25, 0], [15, 15], [-5, 18], [-15, -10]];
                
                positions.forEach((pos, i) => {
                    ctx.beginPath();
                    ctx.arc(pos[0], pos[1], 7, 0, Math.PI * 2);
                    ctx.fillStyle = paintColors[i];
                    ctx.fill();
                });
                
                ctx.restore();
            }

            function drawBrush(x, y, scale, rotation) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rotation);
                ctx.scale(scale, scale);
                
                // Handle
                ctx.beginPath();
                ctx.roundRect(-3, 0, 6, 40, 3);
                ctx.fillStyle = '#c4a35a';
                ctx.fill();
                ctx.strokeStyle = '#a08040';
                ctx.lineWidth = 1;
                ctx.stroke();
                
                // Ferrule
                ctx.beginPath();
                ctx.roundRect(-4, -5, 8, 8, 2);
                ctx.fillStyle = '#a0a0a0';
                ctx.fill();
                
                // Bristles
                ctx.beginPath();
                ctx.moveTo(-5, -5);
                ctx.quadraticCurveTo(-6, -20, 0, -25);
                ctx.quadraticCurveTo(6, -20, 5, -5);
                ctx.fillStyle = COLORS.roseDeep;
                ctx.fill();
                
                ctx.restore();
            }

            // ==================== FLOATING ELEMENTS ====================
            const floatingElements = [];
            const MAX_FLOATING = 40;

            function initFloatingElements() {
                for (let i = 0; i < MAX_FLOATING; i++) {
                    floatingElements.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        vx: (Math.random() - 0.5) * 0.5,
                        vy: (Math.random() - 0.5) * 0.5 - 0.3,
                        size: Math.random() * 20 + 10,
                        type: Math.floor(Math.random() * 4), // 0: heart, 1: star, 2: flower, 3: spark
                        color: [COLORS.gold, COLORS.rose, COLORS.teal, COLORS.purple][Math.floor(Math.random() * 4)],
                        rotation: Math.random() * Math.PI * 2,
                        rotationSpeed: (Math.random() - 0.5) * 0.02,
                        opacity: Math.random() * 0.5 + 0.3,
                        phase: Math.random() * Math.PI * 2
                    });
                }
            }

            function updateFloatingElements() {
                floatingElements.forEach(el => {
                    el.x += el.vx;
                    el.y += el.vy;
                    el.rotation += el.rotationSpeed;
                    
                    // Wrap around
                    if (el.x < -50) el.x = width + 50;
                    if (el.x > width + 50) el.x = -50;
                    if (el.y < -50) el.y = height + 50;
                    if (el.y > height + 50) el.y = -50;
                    
                    // Mouse interaction
                    if (isInteracting) {
                        const dx = mouseX - el.x;
                        const dy = mouseY - el.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            const force = (150 - dist) / 150;
                            el.vx -= (dx / dist) * force * 0.3;
                            el.vy -= (dy / dist) * force * 0.3;
                        }
                    }
                    
                    // Damping
                    el.vx *= 0.99;
                    el.vy *= 0.99;
                    el.vy -= 0.01; // Slow upward drift
                });
            }

            function drawFloatingElements() {
                floatingElements.forEach(el => {
                    ctx.globalAlpha = el.opacity;
                    const pulseSize = el.size + Math.sin(time * 0.05 + el.phase) * 3;
                    
                    switch (el.type) {
                        case 0:
                            drawHeart(el.x, el.y, pulseSize * 0.5, el.color, el.rotation);
                            break;
                        case 1:
                            drawStar(el.x, el.y, pulseSize * 0.5, 5, el.color, el.rotation);
                            break;
                        case 2:
                            drawFlower(el.x, el.y, pulseSize, 6, el.color, el.rotation);
                            break;
                        case 3:
                            drawCircle(el.x, el.y, pulseSize * 0.3, el.color, true);
                            break;
                    }
                });
                ctx.globalAlpha = 1;
            }

            // ==================== BACKGROUND EFFECTS ====================
            function drawBackground() {
                // Gradient background
                const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, Math.max(width, height) * 0.8);
                gradient.addColorStop(0, '#1a1a2e');
                gradient.addColorStop(0.5, '#12121f');
                gradient.addColorStop(1, '#0a0a12');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, width, height);
                
                // Animated gradient orbs
                const orbTime = time * 0.01;
                
                // Gold orb
                const goldX = centerX + Math.sin(orbTime) * width * 0.2;
                const goldY = centerY + Math.cos(orbTime * 0.7) * height * 0.15;
                const goldGradient = ctx.createRadialGradient(goldX, goldY, 0, goldX, goldY, 200);
                goldGradient.addColorStop(0, 'rgba(244, 196, 48, 0.15)');
                goldGradient.addColorStop(1, 'rgba(244, 196, 48, 0)');
                ctx.fillStyle = goldGradient;
                ctx.fillRect(0, 0, width, height);
                
                // Rose orb
                const roseX = centerX + Math.cos(orbTime * 0.8) * width * 0.25;
                const roseY = centerY + Math.sin(orbTime * 1.1) * height * 0.2;
                const roseGradient = ctx.createRadialGradient(roseX, roseY, 0, roseX, roseY, 250);
                roseGradient.addColorStop(0, 'rgba(255, 107, 138, 0.12)');
                roseGradient.addColorStop(1, 'rgba(255, 107, 138, 0)');
                ctx.fillStyle = roseGradient;
                ctx.fillRect(0, 0, width, height);
                
                // Teal orb
                const tealX = centerX + Math.sin(orbTime * 1.2) * width * 0.3;
                const tealY = centerY + Math.cos(orbTime * 0.9) * height * 0.25;
                const tealGradient = ctx.createRadialGradient(tealX, tealY, 0, tealX, tealY, 180);
                tealGradient.addColorStop(0, 'rgba(45, 212, 191, 0.1)');
                tealGradient.addColorStop(1, 'rgba(45, 212, 191, 0)');
                ctx.fillStyle = tealGradient;
                ctx.fillRect(0, 0, width, height);
            }

            // ==================== SPARKLE LINES ====================
            function drawSparkleLines() {
                const lineCount = 8;
                for (let i = 0; i < lineCount; i++) {
                    const angle = (i / lineCount) * Math.PI * 2 + time * 0.005;
                    const length = 100 + Math.sin(time * 0.02 + i) * 50;
                    const startX = centerX + Math.cos(angle) * 50;
                    const startY = centerY + Math.sin(angle) * 50;
                    const endX = centerX + Math.cos(angle) * length;
                    const endY = centerY + Math.sin(angle) * length;
                    
                    const lineGradient = ctx.createLinearGradient(startX, startY, endX, endY);
                    lineGradient.addColorStop(0, 'rgba(244, 196, 48, 0.3)');
                    lineGradient.addColorStop(1, 'rgba(244, 196, 48, 0)');
                    
                    drawLine(startX, startY, endX, endY, lineGradient, 1);
                }
            }

            // ==================== CONNECTING HEARTS ====================
            function drawConnectingHearts() {
                const heart1X = width * 0.25;
                const heart1Y = height * 0.6;
                const heart2X = width * 0.75;
                const heart2Y = height * 0.6;
                
                const bob1 = Math.sin(time * 0.05) * 10;
                const bob2 = Math.sin(time * 0.05 + 1) * 10;
                
                // Dotted line between hearts
                ctx.setLineDash([5, 10]);
                ctx.beginPath();
                ctx.moveTo(heart1X, heart1Y + bob1);
                ctx.quadraticCurveTo(centerX, centerY + height * 0.1, heart2X, heart2Y + bob2);
                ctx.strokeStyle = 'rgba(244, 196, 48, 0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.setLineDash([]);
                
                // Draw small hearts along the path
                const pathHearts = 5;
                for (let i = 0; i < pathHearts; i++) {
                    const t = (i + 1) / (pathHearts + 1);
                    const px = lerp(heart1X, heart2X, t);
                    const py = lerp(heart1Y + bob1, heart2Y + bob2, t) + Math.sin(time * 0.05 + i) * 20 - 50 * Math.sin(t * Math.PI);
                    const size = 8 + Math.sin(time * 0.1 + i * 0.5) * 2;
                    
                    drawHeart(px, py, size, COLORS.rose, Math.sin(time * 0.02 + i) * 0.2);
                }
                
                // Main hearts
                drawHeart(heart1X, heart1Y + bob1, 30, COLORS.gold, Math.sin(time * 0.02) * 0.1);
                drawHeart(heart2X, heart2Y + bob2, 30, COLORS.rose, Math.sin(time * 0.02 + 1) * 0.1);
            }

            // ==================== CORNER DECORATIONS ====================
            function drawCornerDecorations() {
                const cornerSize = 60;
                const time2 = time * 0.02;
                
                // Top-right corner
                ctx.save();
                ctx.translate(width - 40, 40);
                ctx.rotate(time2 * 0.5);
                drawStar(0, 0, cornerSize * 0.3, 4, COLORS.gold, 0);
                ctx.restore();
                
                // Top-left corner
                ctx.save();
                ctx.translate(40, 40);
                ctx.rotate(-time2 * 0.5);
                drawStar(0, 0, cornerSize * 0.25, 6, COLORS.rose, 0);
                ctx.restore();
                
                // Bottom-right corner
                ctx.save();
                ctx.translate(width - 40, height - 40);
                ctx.rotate(time2 * 0.3);
                drawFlower(0, 0, cornerSize * 0.4, 5, COLORS.teal, time2);
                ctx.restore();
                
                // Bottom-left corner
                ctx.save();
                ctx.translate(40, height - 40);
                ctx.rotate(-time2 * 0.3);
                drawFlower(0, 0, cornerSize * 0.4, 5, COLORS.purple, -time2);
                ctx.restore();
            }

            // ==================== CENTER ART PIECE ====================
            function drawCenterArtPiece() {
                const artY = centerY * 0.55;
                const scale = Math.min(width, height) / 800;
                
                // Glow behind
                const glowGradient = ctx.createRadialGradient(centerX, artY, 0, centerX, artY, 150 * scale);
                glowGradient.addColorStop(0, 'rgba(244, 196, 48, 0.2)');
                glowGradient.addColorStop(1, 'rgba(244, 196, 48, 0)');
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(centerX, artY, 150 * scale, 0, Math.PI * 2);
                ctx.fill();
                
                // Rotating flower backdrop
                const flowerRotation = time * 0.01;
                for (let i = 0; i < 3; i++) {
                    ctx.globalAlpha = 0.3 - i * 0.1;
                    drawFlower(centerX, artY, 80 * scale + i * 30, 8, COLORS.gold, flowerRotation + i * 0.5);
                }
                ctx.globalAlpha = 1;
                
                // Character on left
                const char1X = centerX - 120 * scale;
                const char1Bob = Math.sin(time * 0.05) * 5;
                drawCharacter(char1X, artY, scale, char1Bob, true);
                
                // Character on right
                const char2X = centerX + 120 * scale;
                const char2Bob = Math.sin(time * 0.05 + Math.PI) * 5;
                ctx.save();
                ctx.translate(char2X, artY + char2Bob);
                ctx.scale(-scale, scale);
                ctx.translate(-char2X, -artY);
                drawCharacter(char2X, artY, 1, 0, false);
                ctx.restore();
                
                // Palette and brush
                const paletteX = centerX - 60 * scale;
                const paletteY = artY + 80 * scale;
                drawPalette(paletteX, paletteY, scale, Math.sin(time * 0.02) * 0.1);
                
                const brushX = centerX + 60 * scale;
                const brushY = artY + 80 * scale;
                drawBrush(brushX, brushY, scale, Math.sin(time * 0.025) * 0.2 + 0.3);
            }

            // ==================== PARTICLE BURST ====================
            const bursts = [];

            function createBurst(x, y) {
                const particleCount = 20;
                for (let i = 0; i < particleCount; i++) {
                    const angle = (i / particleCount) * Math.PI * 2;
                    const speed = 3 + Math.random() * 5;
                    bursts.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        size: 5 + Math.random() * 10,
                        color: [COLORS.gold, COLORS.rose, COLORS.teal, COLORS.purple][Math.floor(Math.random() * 4)],
                        life: 1,
                        type: Math.floor(Math.random() * 3)
                    });
                }
            }

            function updateBursts() {
                for (let i = bursts.length - 1; i >= 0; i--) {
                    const p = bursts[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1; // Gravity
                    p.life -= 0.02;
                    p.size *= 0.98;
                    
                    if (p.life <= 0) {
                        bursts.splice(i, 1);
                    }
                }
            }

            function drawBursts() {
                bursts.forEach(p => {
                    ctx.globalAlpha = p.life;
                    switch (p.type) {
                        case 0:
                            drawHeart(p.x, p.y, p.size, p.color, 0, false);
                            break;
                        case 1:
                            drawStar(p.x, p.y, p.size, 5, p.color, 0, false);
                            break;
                        case 2:
                            drawCircle(p.x, p.y, p.size, p.color, false);
                            break;
                    }
                });
                ctx.globalAlpha = 1;
            }

            // ==================== WAVE EFFECT ====================
            function drawWaveEffect() {
                const waveY = height - 50;
                ctx.beginPath();
                ctx.moveTo(0, waveY);
                
                for (let x = 0; x <= width; x += 10) {
                    const y = waveY + Math.sin((x * 0.01) + time * 0.03) * 15;
                    ctx.lineTo(x, y);
                }
                
                ctx.lineTo(width, height);
                ctx.lineTo(0, height);
                ctx.closePath();
                
                const waveGradient = ctx.createLinearGradient(0, waveY - 20, 0, height);
                waveGradient.addColorStop(0, 'rgba(45, 212, 191, 0.2)');
                waveGradient.addColorStop(1, 'rgba(45, 212, 191, 0)');
                ctx.fillStyle = waveGradient;
                ctx.fill();
            }

            // ==================== TOP WAVE ====================
            function drawTopWave() {
                const waveY = 30;
                ctx.beginPath();
                ctx.moveTo(0, waveY);
                
                for (let x = 0; x <= width; x += 10) {
                    const y = waveY + Math.sin((x * 0.015) - time * 0.025) * 10;
                    ctx.lineTo(x, y);
                }
                
                ctx.lineTo(width, 0);
                ctx.lineTo(0, 0);
                ctx.closePath();
                
                const waveGradient = ctx.createLinearGradient(0, 0, 0, waveY + 10);
                waveGradient.addColorStop(0, 'rgba(244, 196, 48, 0.15)');
                waveGradient.addColorStop(1, 'rgba(244, 196, 48, 0)');
                ctx.fillStyle = waveGradient;
                ctx.fill();
            }

            // ==================== MAIN ANIMATION LOOP ====================
            function animate() {
                time++;
                
                // Clear canvas
                ctx.clearRect(0, 0, width, height);
                
                // Draw layers
                drawBackground();
                drawTopWave();
                drawWaveEffect();
                drawSparkleLines();
                
                // Update and draw floating elements
                updateFloatingElements();
                drawFloatingElements();
                
                // Draw center art piece (characters with palette/brush)
                drawCenterArtPiece();
                
                // Draw connecting hearts
                drawConnectingHearts();
                
                // Corner decorations
                drawCornerDecorations();
                
                // Update and draw bursts
                updateBursts();
                drawBursts();
                
                requestAnimationFrame(animate);
            }

            // ==================== EVENT LISTENERS ====================
            function handleInteraction(x, y) {
                isInteracting = true;
                mouseX = x;
                mouseY = y;
                createBurst(x, y);
            }

            canvas.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            canvas.addEventListener('click', (e) => {
                handleInteraction(e.clientX, e.clientY);
            });

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                handleInteraction(touch.clientX, touch.clientY);
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                mouseX = touch.clientX;
                mouseY = touch.clientY;
                isInteracting = true;
            }, { passive: false });

            canvas.addEventListener('touchend', () => {
                isInteracting = false;
            });

            window.addEventListener('resize', () => {
                resize();
                // Reinitialize floating elements on resize
                floatingElements.length = 0;
                initFloatingElements();
            });

            // Hide tap hint after first interaction
            let hintHidden = false;
            canvas.addEventListener('click', () => {
                if (!hintHidden) {
                    tapHint.style.opacity = '0';
                    hintHidden = true;
                }
            }, { once: true });

            // ==================== CSS PARTICLES (Backup) ====================
            function createCSSParticles() {
                for (let i = 0; i < 15; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'css-particle';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.width = (Math.random() * 6 + 2) + 'px';
                    particle.style.height = particle.style.width;
                    particle.style.background = [COLORS.gold, COLORS.rose, COLORS.teal][Math.floor(Math.random() * 3)];
                    particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                    particle.style.animationDelay = Math.random() * 5 + 's';
                    cssParticles.appendChild(particle);
                }
            }

            // ==================== INITIALIZATION ====================
            function init() {
                resize();
                initFloatingElements();
                createCSSParticles();
                
                // Start animation
                animate();
                
                // Hide loading screen
                setTimeout(() => {
                    loadingScreen.classList.add('hidden');
                }, 1500);
            }

            // Start when DOM is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>
</body>
